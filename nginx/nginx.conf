worker_processes auto;

events {
    worker_connections 1024;
}

http {
    sendfile on;

    # With Cloudflare Tunnel the real client IP is in CF-Connecting-IP.
    map $http_cf_connecting_ip $real_client_ip {
        default $http_cf_connecting_ip;
        ""      $binary_remote_addr;
    }

    # API rate-limit: 30 req/minute per real IP, burst of 10 queued.
    limit_req_zone $real_client_ip zone=api:10m rate=30r/m;
    limit_req_status 429;

    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:3000;
    }

    server {
        listen 80;
        server_name warren.diegocanafs.com.br;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name warren.diegocanafs.com.br;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # Health + readiness + metrics → backend, no rate limit
        location ~ ^/(health|ready|metrics) {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $real_client_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API routes → backend, rate-limited
        location /api/ {
            limit_req zone=api burst=10 nodelay;

            proxy_read_timeout 150s;
            proxy_send_timeout 150s;

            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $real_client_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Everything else → Next.js frontend
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $real_client_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
