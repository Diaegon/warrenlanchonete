services:
  db:
    image: postgres:16.8-alpine3.21
    container_name: warren_postgres
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    networks:
      - internal          # DB is only reachable by the backend, never from outside
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/diaegon/warrenlanchonete-backend:latest
    container_name: warren_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CHROMA_PERSIST_DIR=/app/rag_data
      - ENVIRONMENT=production
      - CORS_ORIGINS=${CORS_ORIGINS}
      - LOG_LEVEL=INFO
    volumes:
      - ./warren-backend/rag_data:/app/rag_data
    networks:
      - internal
      - web
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: warren_nginx
    restart: always
    ports:
      - "127.0.0.1:8082:80"
      - "127.0.0.1:8444:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - web
    depends_on:
      - backend

networks:
  internal:   # DB ↔ backend only
  web:        # nginx ↔ backend only

volumes:
  pgdata_prod:
