name: CD Production

on:
  workflow_run:
    workflows: ["CI Backend", "CI Frontend", "CI Ingestion"]
    branches: [main]
    types: 
      - completed
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only run if the triggering CI workflows were successful
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    
    steps:
    - name: Deploy to Hostinger VPS
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          cd /opt/warrenlanchonete
          git pull origin main
          
          # Create or update .env file with secrets
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
          
          # Apply database migrations
          docker-compose -f docker-compose.prod.yml run --rm backend uv run alembic upgrade head
          
          # Rebuild and restart containers with zero downtime (where supported)
          docker-compose -f docker-compose.prod.yml up -d --build
