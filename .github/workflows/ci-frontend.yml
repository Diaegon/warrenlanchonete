name: CI Frontend

on:
  push:
    branches: [ "main" ]
    paths:
      - 'warren-frontend/**'
      - '.github/workflows/ci-frontend.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'warren-frontend/**'
      - '.github/workflows/ci-frontend.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./warren-frontend

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      run: npm install

    - name: Lint
      run: npm run lint --if-present

    - name: Test
      run: npm test --if-present

    - name: Build
      run: npm run build
