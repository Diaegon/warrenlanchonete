name: CI Frontend

on:
  push:
    branches-ignore: [main]
    paths:
      - 'warren-frontend/**'
      - '.github/workflows/ci-frontend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'warren-frontend/**'
      - '.github/workflows/ci-frontend.yml'

jobs:
  build:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./warren-frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: warren-frontend/package-lock.json

      # npm ci is faster and deterministic: it uses package-lock.json exactly,
      # never writes to it, and fails if the lockfile is out of sync.
      - name: Install dependencies
        run: npm ci

      - name: Lint
        env:
          NEXT_TELEMETRY_DISABLED: 1
        run: npm run lint

      - name: Test
        run: npm test --if-present

      - name: Build
        env:
          NEXT_TELEMETRY_DISABLED: 1
        run: npm run build
