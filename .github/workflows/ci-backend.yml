name: CI Backend

# Runs on PRs and on pushes to non-main branches.
# Main is handled by cd-production.yml which includes its own test gate.
on:
  push:
    branches-ignore: [main]
    paths:
      - 'warren-backend/**'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'warren-backend/**'
      - '.github/workflows/ci-backend.yml'

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./warren-backend

    steps:
      - uses: actions/checkout@v4

      # WeasyPrint (PDF generation) needs pango at import time.
      # Same packages installed in warren-backend/Dockerfile.
      - name: Install system dependencies (WeasyPrint)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangoft2-1.0-0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "warren-backend/uv.lock"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Test with coverage
        env:
          TESTING: "1"
        run: uv run pytest --cov=app --cov-report=xml -m "not integration and not slow"
